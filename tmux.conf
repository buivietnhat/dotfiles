# remap prefix from 'C-b' to 'C-a'
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# split panes using \ and -
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# switch panes using Option-arrow without prefix
bind h select-pane -L
bind l select-pane -R
bind k select-pane -U
bind j select-pane -D

# Alt-z to toggle full pane
bind -n M-z resize-pane -Z

bind -n C-n next-window
bind -n C-p previous-window

# Enable mouse mode (tmux 2.1 and above)
set -g mouse on

set -s escape-time 0

# Start windows and panes at 1, not 0
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on
set-option -g allow-rename off
set-window-option -g automatic-rename off

set-window-option -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection

# open new window at current working directory
bind c new-window -c "#{pane_current_path}"

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

# dracula theme
set -g @plugin 'dracula/tmux'
set -g @dracula-plugins ""
set -g @dracula-show-left-icon "#S"
set -g @dracula-show-flags true
set -g @dracula-show-powerline true
set -g @dracula-show-empty-plugins false

# allow copy to system clipboard
set -g @plugin 'tmux-plugins/tmux-yank'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'

# Unbind M-i after plugins load so it passes through to neovim
unbind -n M-i

set -g status-right ''
set -g status-right-length 0
