[ids]
*

# Ctrl+Left/Right act as Home/End; with Shift they select to line start/end.
# Defined as modifier layers (not `control+right` in [main]) so keyd strips
# the triggering Control modifier and emits a clean Home/End.
[control]
left = home
right = end

[control+shift]
left = S-home
right = S-end
