# remap prefix from 'C-b' to 'C-a'
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# split panes using \ and -
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# switch panes using Option-arrow without prefix
bind h select-pane -L
bind l select-pane -R
bind k select-pane -U
bind j select-pane -D

# Avoid date/time taking up space
set -g status-right ''
set -g status-right-length 0

# Alt-z to toggle full pane
bind -n M-z resize-pane -Z

bind -n C-n next-window
bind -n C-p previous-window

# Enable mouse mode (tmux 2.1 and above)
set -g mouse on

set -s escape-time 0

# Start windows and panes at 1, not 0
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

set-window-option -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection

# open new window at current working directory
bind c new-window -c "#{pane_current_path}"

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

# dracula theme
#set -g @plugin 'dracula/tmux'
#set -g @dracula-show-ssh-session-port true
#set -g @dracula-plugins ""
#set -g @dracula-show-left-icon "#h"
#set -g @dracula-show-flags true

# the default is 5, it can accept any number
#set -g @dracula-refresh-rate 5

# github dark dimmed theme
set -g status-style "bg=#22272e,fg=#adbac7"

set -g window-status-format " #I:#W "
set -g window-status-style "bg=#22272e,fg=#636e7b"

set -g window-status-current-format " #I:#W "
set -g window-status-current-style "bg=#2d333b,fg=#6cb6ff,bold"

set -g status-left " #[bg=#539bf5,fg=#22272e,bold] #S #[default] "
set -g status-left-length 30

set -g pane-border-style "fg=#444c56"
set -g pane-active-border-style "fg=#539bf5"

set -g message-style "bg=#2d333b,fg=#adbac7"


# allow copy to system clipboard
set -g @plugin 'tmux-plugins/tmux-yank'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'

# Unbind M-i after plugins load so it passes through to neovim
unbind -n M-i
