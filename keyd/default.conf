[ids]
*

[main]
# Caps Lock acts as Escape (replaces input-remapper / setxkbmap caps:escape).
capslock = esc

# Ctrl+Caps Lock toggles the real Caps Lock (Control is stripped by the layer).
[control]
capslock = capslock

# Alt+Left/Right act as Home/End; with Shift they select to line start/end.
# Defined as modifier layers (not `alt+right` in [main]) so keyd strips
# the triggering Alt modifier and emits a clean Home/End.
[alt]
left = home
right = end

[alt+shift]
left = S-home
right = S-end
