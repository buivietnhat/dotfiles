- defaults:
    link:
      relink: true

- clean: ['~']

- link:
    ~/.tmux.conf: tmux.conf
    ~/.vimrc: vimrc
    ~/.zshrc: zshrc
    ~/.ideavimrc: ideavimrc
    ~/.gitconfig: gitconfig
    ~/.functions: functions
    ~/.aliases: aliases
    ~/.config/alacritty/alacritty.toml: alacritty.toml
    ~/.config/nvim: nvim
    ~/.config/i3: i3

- create:
    - ~/.vim/undo-history

- shell:
  - [git submodule update --init --recursive, Installing submodules]
  # keyd lives in /etc, which dotbot can't symlink, so copy it with sudo.
  # keyd is not in Ubuntu 24.04 repos; build from source (https://github.com/rvaiya/keyd) first.
  - command: sudo install -Dm644 keyd/default.conf /etc/keyd/default.conf && sudo systemctl enable --now keyd && sudo keyd reload
    description: Installing keyd config (Ctrl+Right -> End)
    stdin: true
    stdout: true
